name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pandas sqlalchemy psycopg2-binary openpyxl requests
          python -m pip install pytest httpx

      - name: Run CI checks
        run: |
          python tools/ci_checks.py --allow-db-skip --reports-dir output/reports --timestamp-tz utc

      - name: Engine + API + desktop tests
        run: |
          python -m pytest \
            tests/test_true_base.py tests/test_grid_truebase.py \
            tests/test_engine_report.py tests/test_highlight.py \
            tests/test_sync_payload_no_secrets.py \
            tests/test_discount_reports_api.py tests/test_desktop_backend.py \
            tests/test_audit_fixes.py tests/test_monitoring.py tests/test_sharetrip_combine.py \
            tests/test_sharetrip_judge.py tests/test_bdfare_commission.py \
            -q

  web:
    # Catch type/build breakage BEFORE the Vercel deploy — a missing import once
    # shipped a broken build because local incremental tsc missed it.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Typecheck + production build
        run: npm run build
