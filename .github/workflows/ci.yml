name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pandas sqlalchemy psycopg2-binary openpyxl requests

      - name: Run CI checks
        run: |
          python tools/ci_checks.py --allow-db-skip --reports-dir output/reports --timestamp-tz utc
